<!--
  Shared 루비AI email wrapper — DO NOT paste this directly into Supabase.
  Instead, copy one of the 5 final templates in this folder.
  This file exists as a reference for the shared header/footer structure.

  Replace [BODY] with the template-specific body.
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>루비AI</title>
<style>
  @media (prefers-color-scheme: dark) {
    .bg { background:#0a0a0c !important; }
    .card { background:#15151a !important; border-color:#26262e !important; }
    .text { color:#f5f5f7 !important; }
    .muted { color:#9ca0ac !important; }
    .border { border-color:#26262e !important; }
    .btn { background:#f5f5f7 !important; color:#0a0a0c !important; }
    .badge { background:#f5f5f7 !important; color:#0a0a0c !important; }
    .pink-soft { background:#3d1729 !important; color:#fba8d0 !important; }
  }
</style>
</head>
<body class="bg" style="margin:0;padding:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="bg" style="background:#fafafa;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- Main card -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="card border" style="max-width:560px;background:#ffffff;border:1px solid #e2e4ea;border-radius:24px;">

          <!-- Header: logo + brand -->
          <tr>
            <td style="padding:36px 36px 28px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td class="badge" style="background:#0c0c0e;width:36px;height:36px;border-radius:10px;text-align:center;vertical-align:middle;">
                    <div style="font-size:18px;line-height:36px;color:#ec4899;font-weight:700;">✦</div>
                  </td>
                  <td style="padding-left:12px;vertical-align:middle;">
                    <span class="text" style="font-size:17px;font-weight:600;color:#0c0c0e;letter-spacing:-0.01em;">루비AI</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body slot -->
          <tr>
            <td style="padding:0 36px 36px;">
              [BODY]
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="border" style="padding:24px 36px 32px;border-top:1px solid #e2e4ea;">
              <p class="muted" style="margin:0 0 8px;color:#6e707a;font-size:12px;line-height:1.6;">
                루비AI · 글로벌 체험단 마케팅 플랫폼
              </p>
              <p class="muted" style="margin:0;color:#9ca0ac;font-size:12px;line-height:1.6;">
                <a href="https://ruby-ai.kr" class="muted" style="color:#6e707a;text-decoration:underline;">ruby-ai.kr</a>
                &nbsp;·&nbsp;
                <a href="mailto:contact@plander.io" class="muted" style="color:#6e707a;text-decoration:underline;">contact@plander.io</a>
              </p>
            </td>
          </tr>

        </table>

        <!-- Bottom disclaimer -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;margin-top:20px;">
          <tr>
            <td align="center" style="padding:0 16px;">
              <p class="muted" style="margin:0;color:#9ca0ac;font-size:11px;line-height:1.6;">
                이 메일이 의도하지 않은 메일이라면 안전하게 무시해주세요.
              </p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
